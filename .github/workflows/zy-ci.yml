name: Zy CI
on:
  push:
    branches: ['zy-os/**']
  pull_request:
jobs:
  build:
    name: install + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
